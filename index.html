<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="fun-fact" id="funFact">
      <span class="fun-fact-icon">💡</span>
      <p id="funFactText">Did you know...</p>
    </div>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
      <div class="modal-media">
        <img id="modalImage" src="" alt="" />
        <iframe id="modalVideo" src="" title="APOD video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <a id="modalVideoLink" href="" target="_blank" rel="noopener noreferrer" class="modal-video-link">▶ Watch video on original site</a>
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
